<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 완료 — 믿글컴퍼니</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
      background: #f9f9f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      border: 1px solid #ebebeb;
      text-align: center;
    }
    .icon { font-size: 36px; margin-bottom: 20px; }
    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 10px;
    }
    .desc {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .info-box {
      background: #f9f9f7;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 24px;
      text-align: left;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 5px 0;
      border-top: 1px solid #eee;
      color: #555;
    }
    .info-row:first-child { border-top: none; }
    .info-row span:last-child { font-weight: 500; color: #1a1a1a; }
    .kakao-box {
      background: #FEE500;
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #3A1D1D;
      font-weight: 500;
    }
    #code-btn {
      width: 100%;
      padding: 15px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #code-btn:hover { background: #333; }
    .notice {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
    }
    .order-info {
      font-size: 11px;
      color: #bbb;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>결제가 완료되었습니다</h1>
    <p class="desc">
      카카오톡으로 참여코드를 보내드립니다.<br>
      코드를 받으신 후 진단을 시작해주세요.
    </p>

    <div class="info-box">
      <div class="info-row">
        <span>서비스</span>
        <span>STEP 1 · 사업 기준 자가진단</span>
      </div>
      <div class="info-row">
        <span>결제 금액</span>
        <span>30,000원</span>
      </div>
      <div class="info-row">
        <span>코드 수령</span>
        <span>평일 기준 몇 시간 이내</span>
      </div>
    </div>

    <div class="kakao-box">
      💬 카카오톡 채널 · 믿글마케팅에서 코드를 보내드립니다
    </div>

    <button id="code-btn" onclick="goToCodeEntry()">코드 입력하러 가기 →</button>
    <p class="notice">코드를 아직 못 받으셨다면 잠시 후 다시 눌러주세요.</p>
    <p class="order-info" id="order-info"></p>
    <p class="privacy-note" style="font-size:11px;color:#bbb;margin-top:12px;line-height:1.7;text-align:center;">본 결제는 토스페이먼츠(주)를 통해 처리되며,<br>결제 처리 목적으로 성명·결제 수단 정보가 제공됩니다.<br><a href="https://mitgeul.co.kr/terms.html" style="color:#bbb;">이용약관</a> · <a href="https://mitgeul.co.kr/privacy.html" style="color:#bbb;">개인정보처리방침</a></p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const orderId = params.get("orderId") || "";
    if (orderId) {
      document.getElementById("order-info").textContent = "주문번호: " + orderId;
    }

    function goToCodeEntry() {
      window.location.href = "https://ai.mitgeul.co.kr/";
    }
  </script>
</body>
</html>
