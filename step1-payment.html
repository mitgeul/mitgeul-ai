<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEP 1 결제 — 믿글컴퍼니</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
      background: #f9f9f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      border: 1px solid #ebebeb;
    }
    .label {
      font-size: 12px;
      color: #888;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .desc {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 28px;
      padding: 16px;
      background: #f9f9f7;
      border-radius: 10px;
    }
    .price {
      font-size: 26px;
      font-weight: 500;
      color: #1a1a1a;
    }
    .price-unit { font-size: 14px; color: #888; }
    .includes {
      font-size: 13px;
      color: #555;
      line-height: 2;
      margin-bottom: 28px;
    }
    .includes li {
      list-style: none;
      display: flex;
      gap: 8px;
    }
    .includes li::before { content: "—"; color: #bbb; }
    #pay-btn {
      width: 100%;
      padding: 15px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #pay-btn:hover { background: #333; }
    #pay-btn:disabled { background: #aaa; cursor: not-allowed; }
    .notice {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">MITGEUL · STEP 1</p>
    <h1>사업 기준 · 매장 자가진단</h1>
    <p class="desc">
      결제 후 참여코드를 카카오로 보내드립니다.
    </p>

    <div class="price-row">
      <span class="price">30,000원</span>
      <span class="price-unit">· 부가세 포함</span>
    </div>

    <ul class="includes">
      <li>사업 기준 점검 (15문항)</li>
      <li>매장 자가진단 (20문항)</li>
      <li>점수 · 업종별 벤치마크</li>
      <li>맞춤 실행 솔루션</li>
      <li>통합 진단 리포트</li>
    </ul>

    <button id="pay-btn">결제하고 진단 시작하기</button>
    <p class="notice">
      결제 완료 후 카카오톡으로 참여코드를 보내드립니다.<br>
      평일 기준 수령까지 최대 몇 시간 소요될 수 있습니다.
    </p>
  </div>

  <!-- 토스페이먼츠 SDK -->
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <script>
    // ※ clientKey: 토스페이먼츠 대시보드 → 개발 → API 키에서 복사
    // 테스트: "test_ck_..." / 실운영: "live_ck_..."
    const CLIENT_KEY = "test_ck_여기에_클라이언트키_입력";

    const tossPayments = TossPayments(CLIENT_KEY);
    const widgets = tossPayments.widgets({ customerKey: "MITGEUL_GUEST" });

    const btn = document.getElementById("pay-btn");

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.textContent = "결제창 열는 중...";

      // 주문 ID: 중복 없어야 함 (타임스탬프 기반)
      const orderId = "STEP1-" + Date.now();

      try {
        await tossPayments.requestPayment({
          method: "CARD",              // 카드 결제
          amount: { currency: "KRW", value: 30000 },
          orderId: orderId,
          orderName: "믿글 STEP 1 · 사업 기준 자가진단",
          customerName: "고객",        // 필요 시 입력 받아서 넣기
          successUrl: window.location.origin + "/step1-success.html?orderId=" + orderId,
          failUrl:    window.location.origin + "/payment.html?fail=1",
        });
      } catch (e) {
        console.error(e);
        btn.disabled = false;
        btn.textContent = "결제하고 진단 시작하기";
        if (e.code !== "USER_CANCEL") {
          alert("결제 중 오류가 발생했습니다. 다시 시도해주세요.");
        }
      }
    });

    // 실패 파라미터 처리
    const params = new URLSearchParams(location.search);
    if (params.get("fail") === "1") {
      alert("결제가 취소되었거나 실패했습니다. 다시 시도해주세요.");
    }
  </script>
</body>
</html>
